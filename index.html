<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Tuneverse Mobile</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="topbar">

    <div class="brand">

        <img
        src="assets/icons/logotv.PNG"
        class="logo">

        <h1>TUNEVERSE</h1>

    </div>

    <input
    id="search"
    placeholder="Buscar música">

</header>

<main>

    <section class="hero">

        <div class="hero-content">

            <h2>

                <img
                id="heroCover"
                src="assets/icons/music.png"
                class="hero-cover">

                Tu música.
                Tu universo.

            </h2>

            <button>
                Escuchar ahora
            </button>

        </div>

        <img
        src="assets/covers/song1.jpg"
        class="hero-cover">

    </section>

    <section>

        <h3>Tendencias</h3>

        <div
        id="songsContainer"
        class="songs-row">

        </div>

    </section>

</main>

<!-- REPRODUCTOR PANTALLA COMPLETA -->

<div
id="fullPlayer"
class="full-player">

    <div class="full-header">

        <button
        id="closePlayer">

            ⌄

        </button>

    </div>

    <img
    id="fullCover"
    src="assets/covers/song1.jpg"
    class="full-cover">

    <h2 id="fullTitle">

        Ninguna canción

    </h2>

    <p id="fullArtist">

        Selecciona una canción

    </p>

    <div class="progress-container">

        <div class="progress-bar">

            <div
            id="progress"
            class="progress">

            </div>

        </div>

    </div>

    <div class="full-controls">

        <button id="prevBtn">

            ⏮

        </button>

        <button id="fullPlayBtn">

            ⏸

        </button>

        <button id="nextBtn">

            ⏭

        </button>

    </div>

    <div class="extra-actions">

        <button id="likeBtn">

            ❤️

        </button>

        <button id="playlistBtn">

            ➕ Playlist

        </button>

    </div>

</div>

<!-- MINI PLAYER -->

<div
id="miniPlayer"
class="mini-player">

    <img
    id="cover"
    src="assets/covers/song1.jpg">

    <div>

        <h4 id="songTitle">

            Ninguna canción

        </h4>

        <p id="artistName">

            Selecciona una canción

        </p>

    </div>

    <button
    id="playBtn">

        ▶

    </button>

</div>

<nav class="bottom-nav">

    <button>🏠</button>

    <button>🔍</button>

    <button>🎵</button>

    <button>❤️</button>

    <button>👤</button>

</nav>

<audio id="audio"></audio>

<script src="app.js"></script>

</body>
</html>
